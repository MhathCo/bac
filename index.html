<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, onValue, set, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  // ── Firebase config ──────────────────────────────────────────────────
  // Replace with your own Firebase project credentials
  const firebaseConfig = {
    apiKey: "AIzaSyBZNNRq8ns1O1q3Dp9tRAdGIoMqoUYEwig",
    authDomain: "basic-arse-calendar-8c16b.firebaseapp.com",
    databaseURL: "https://basic-arse-calendar-8c16b-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "basic-arse-calendar-8c16b",
    storageBucket: "basic-arse-calendar-8c16b.firebasestorage.app",
    messagingSenderId: "1056506990060",
    appId: "1:1056506990060:web:42525befdc8fde855384c9",
    measurementId: "G-37GVBZLPVS"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const useLocalMode = false;

  // ── State ────────────────────────────────────────────────────────────
  const state = {
    year: new Date().getFullYear(),
    month: new Date().getMonth(),
    user: null,           // 'math' | 'sally'
    days: {}              // { "YYYY-MM-DD": { math: bool, sally: bool } }
  };

  // ── Helpers ──────────────────────────────────────────────────────────
  const dayKey = (y, m, d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

  function loadLocal() {
    try { return JSON.parse(localStorage.getItem('bac_days') || '{}'); } catch { return {}; }
  }
  function saveLocal(days) {
    localStorage.setItem('bac_days', JSON.stringify(days));
  }

  function listenToDays() {
    if (!useLocalMode && db) {
      const r = ref(db, 'days');
      onValue(r, snap => {
        state.days = snap.val() || {};
        renderCalendar();
      });
    } else {
      state.days = loadLocal();
      renderCalendar();
    }
  }

  async function toggleDay(key) {
    if (!state.user) { showUserPicker(); return; }
    if (!state.days[key]) state.days[key] = { math: false, sally: false };
    state.days[key][state.user] = !state.days[key][state.user];
    if (!state.days[key].math && !state.days[key].sally) delete state.days[key];

    if (!useLocalMode && db) {
      await set(ref(db, `days/${key}`), state.days[key] || null);
    } else {
      saveLocal(state.days);
      renderCalendar();
    }
  }

  // ── Render ───────────────────────────────────────────────────────────
  function renderCalendar() {
    const { year, month } = state;
    const monthNames = ['January','February','March','April','May','June',
                        'July','August','September','October','November','December'];

    document.getElementById('month-title').textContent = `${monthNames[month]} ${year}`;

    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';

    // Day headers
    ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
      const h = document.createElement('div');
      h.className = 'day-header';
      h.textContent = d;
      grid.appendChild(h);
    });

    // First day offset (Mon=0)
    const firstDay = new Date(year, month, 1).getDay();
    const offset = firstDay === 0 ? 6 : firstDay - 1;
    for (let i = 0; i < offset; i++) {
      const blank = document.createElement('div');
      blank.className = 'day-cell empty';
      grid.appendChild(blank);
    }

    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();

    for (let d = 1; d <= daysInMonth; d++) {
      const key = dayKey(year, month, d);
      const data = state.days[key] || {};
      const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;

      const cell = document.createElement('div');
      cell.className = 'day-cell';
      if (isToday) cell.classList.add('today');

      // Determine fill state
      const m = data.math || false;
      const s = data.sally || false;

      if (m && s) cell.classList.add('both');
      else if (m) cell.classList.add('math-working');
      else if (s) cell.classList.add('sally-working');

      // Weekend
      const dow = new Date(year, month, d).getDay();
      if (dow === 0 || dow === 6) cell.classList.add('weekend');

      cell.innerHTML = `<span class="day-num">${d}</span>`;

      // Initials indicators
      if (m || s) {
        const ind = document.createElement('div');
        ind.className = 'indicators';
        if (m) ind.innerHTML += `<span class="ind math-ind">M</span>`;
        if (s) ind.innerHTML += `<span class="ind sally-ind">S</span>`;
        cell.appendChild(ind);
      }

      cell.addEventListener('click', () => toggleDay(key));
      grid.appendChild(cell);
    }

    // Update user indicator
    const ui = document.getElementById('user-indicator');
    if (state.user) {
      ui.textContent = state.user === 'math' ? '◈ Math' : '◈ Sally';
      ui.className = 'user-indicator ' + state.user + '-active';
    } else {
      ui.textContent = '◈ Tap to choose user';
      ui.className = 'user-indicator';
    }

    // Legend dots
    document.getElementById('legend-math').style.opacity = state.user === 'math' ? '1' : '0.5';
    document.getElementById('legend-sally').style.opacity = state.user === 'sally' ? '1' : '0.5';
  }

  function showUserPicker() {
    document.getElementById('user-modal').classList.add('visible');
  }

  // ── Init ─────────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    listenToDays();

    document.getElementById('prev-btn').addEventListener('click', () => {
      state.month--;
      if (state.month < 0) { state.month = 11; state.year--; }
      renderCalendar();
    });
    document.getElementById('next-btn').addEventListener('click', () => {
      state.month++;
      if (state.month > 11) { state.month = 0; state.year++; }
      renderCalendar();
    });

    // Touch swipe
    let startX = 0;
    const cal = document.getElementById('calendar-wrapper');
    cal.addEventListener('touchstart', e => startX = e.touches[0].clientX, {passive:true});
    cal.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      if (Math.abs(dx) > 50) {
        if (dx < 0) document.getElementById('next-btn').click();
        else document.getElementById('prev-btn').click();
      }
    }, {passive:true});

    // User selection
    document.getElementById('pick-math').addEventListener('click', () => {
      state.user = 'math';
      document.getElementById('user-modal').classList.remove('visible');
      renderCalendar();
    });
    document.getElementById('pick-sally').addEventListener('click', () => {
      state.user = 'sally';
      document.getElementById('user-modal').classList.remove('visible');
      renderCalendar();
    });

    document.getElementById('user-indicator').addEventListener('click', showUserPicker);

    // Firebase mode notice
    if (useLocalMode) {
      document.getElementById('mode-badge').style.display = 'flex';
    }
  });
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@400;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');

  :root {
    --gold:       #C9A84C;
    --gold-light: #E8C96D;
    --gold-dark:  #8B6914;
    --cream:      #F5EDD8;
    --ivory:      #FAF6ED;
    --black:      #0A0804;
    --charcoal:   #1A1610;
    --dark-bg:    #0F0C07;

    --math-red:   #C0392B;
    --math-dark:  #922B21;
    --sally-green:#27AE60;
    --sally-dark: #1E8449;

    --border: 1px solid var(--gold-dark);
    --shadow: 0 0 40px rgba(201,168,76,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Cormorant Garamond', serif;
    background: var(--dark-bg);
    color: var(--cream);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── Art Deco background pattern ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(201,168,76,0.03) 20px, rgba(201,168,76,0.03) 21px),
      repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(201,168,76,0.03) 20px, rgba(201,168,76,0.03) 21px);
    pointer-events: none;
    z-index: 0;
  }

  .app-shell {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    min-height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── Header ── */
  .app-header {
    padding: 20px 20px 0;
    text-align: center;
    border-bottom: 1px solid var(--gold-dark);
  }

  .header-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 6px;
  }

  .ornament-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .ornament-diamond {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  .app-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(13px, 4vw, 18px);
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    line-height: 1.1;
  }

  .app-subtitle {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: var(--gold-dark);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 2px;
    margin-bottom: 10px;
  }

  /* ── Mode badge ── */
  #mode-badge {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: rgba(201,168,76,0.08);
    border: 1px solid var(--gold-dark);
    padding: 5px 12px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: var(--gold-dark);
    letter-spacing: 0.2em;
    margin: 8px 20px 0;
    text-align: center;
  }

  /* ── User indicator ── */
  .user-indicator {
    display: block;
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--gold-dark);
    padding: 8px;
    cursor: pointer;
    transition: color 0.2s;
  }
  .user-indicator.math-active  { color: var(--math-red); }
  .user-indicator.sally-active { color: var(--sally-green); }

  /* ── Nav ── */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
  }

  .nav-btn {
    width: 36px; height: 36px;
    background: transparent;
    border: 1px solid var(--gold-dark);
    color: var(--gold);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    font-family: 'Cinzel', serif;
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  }
  .nav-btn:active { background: rgba(201,168,76,0.15); transform: scale(0.9); }

  #month-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(14px, 5vw, 20px);
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.1em;
    text-align: center;
  }

  /* ── Calendar wrapper ── */
  #calendar-wrapper {
    padding: 0 12px;
    flex: 1;
  }

  /* ── Grid ── */
  #cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }

  .day-header {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--gold-dark);
    text-align: center;
    padding: 4px 0;
    text-transform: uppercase;
  }

  .day-cell {
    aspect-ratio: 1;
    border: 1px solid rgba(201,168,76,0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
    background: rgba(201,168,76,0.03);
    overflow: hidden;
  }

  .day-cell.empty { border-color: transparent; background: transparent; cursor: default; }

  .day-cell.weekend .day-num { color: var(--gold-dark); opacity: 0.7; }

  .day-cell.today {
    border-color: var(--gold);
    box-shadow: inset 0 0 0 1px var(--gold-dark);
  }
  .day-cell.today .day-num { color: var(--gold-light); font-weight: 600; }

  .day-cell:active:not(.empty) { transform: scale(0.94); }

  .day-num {
    font-family: 'Cinzel', serif;
    font-size: clamp(10px, 3vw, 14px);
    color: var(--cream);
    z-index: 1;
    line-height: 1;
  }

  /* ── Working states ── */
  .day-cell.math-working {
    background: rgba(192,57,43,0.25);
    border-color: var(--math-red);
  }
  .day-cell.math-working .day-num { color: #F1948A; }

  .day-cell.sally-working {
    background: rgba(39,174,96,0.22);

  .day-cell.both {
    border-color: var(--gold);

    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(

      rgba(192,57,43,0.35) 0px,
      rgba(192,57,43,0.35) 5px,
      rgba(39,174,96,0.35) 5px,
      rgba(39,174,96,0.35) 10px
    );

  .day-cell.both .day-num { color: var(--gold-light); text-shadow: 0 0 6px #000; }

  .indicators {

  .legend {

    gap: 6px;
    font-family: 'Cinzel', serif;
    font-size: 9px;

    color: var(--cream);
    text-transform: uppercase;
    transition: opacity 0.2s;
  }
  .legend-swatch {

  .legend-swatch.sally { background: rgba(39,174,96,0.5); border-color: var(--sally-green); }
  .legend-swatch.both-sw {
    background: repeating-linear-gradient(-45deg, rgba(192,57,43,0.6) 0,rgba(192,57,43,0.6) 3px, rgba(39,174,96,0.6) 3px, rgba(39,174,96,0.6) 6px);
    border-color: var(--gold);
  }

  /* ── Footer ── */
  .app-footer {
    padding: 10px;
    text-align: center;
    border-top: 1px solid var(--gold-dark);
  }

  .footer-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .footer-line {
    flex: 1;
    max-width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dark));
  }
  .footer-line.right { background: linear-gradient(90deg, var(--gold-dark), transparent); }

  .footer-brand {
    font-family: 'Cinzel Decorative', serif;
    font-size: 9px;
    color: var(--gold-dark);
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  .footer-tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 9px;
    color: rgba(201,168,76,0.35);
    font-style: italic;
    letter-spacing: 0.1em;
  }

  /* ── User Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(10,8,4,0.92);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.visible { opacity: 1; pointer-events: all; }

  .modal-box {
    background: var(--charcoal);
    border: 1px solid var(--gold-dark);
    padding: 32px 28px;
    width: min(340px, 90vw);
    text-align: center;
    position: relative;
    box-shadow: 0 0 60px rgba(201,168,76,0.2);
  }

  .modal-box::before, .modal-box::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--gold);
    border-style: solid;
  }
  .modal-box::before { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
  .modal-box::after  { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }

  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--gold-dark);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .modal-heading {
    font-family: 'Cinzel Decorative', serif;
    font-size: 18px;
    color: var(--gold-light);
    margin-bottom: 24px;
  }

  .user-btns {
    display: flex;
    gap: 14px;
    justify-content: center;
  }

  .user-btn {
    flex: 1;
    padding: 16px 12px;
    border: 1px solid;

    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Cinzel', serif;
    font-size: 13px;

  .user-btn.math-btn {

  .user-btn.sally-btn {

  }
  .user-btn.sally-btn:active { background: rgba(39,174,96,0.2); }

  .user-btn-icon {
    font-size: 22px;
  }

  .modal-note {

    font-size: 11px;
    font-style: italic;
    color: var(--gold-dark);

  .install-hint {

    font-size: 9px;
