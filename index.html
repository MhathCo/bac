<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyBZNNRq8ns1O1q3Dp9tRAdGIoMqoUYEwig",
    authDomain: "basic-arse-calendar-8c16b.firebaseapp.com",
    databaseURL: "https://basic-arse-calendar-8c16b-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "basic-arse-calendar-8c16b",
    storageBucket: "basic-arse-calendar-8c16b.firebasestorage.app",
    messagingSenderId: "1056506990060",
    appId: "1:1056506990060:web:42525befdc8fde855384c9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ── Colour palette — rich gradients, not flat ─────────────────────
  const PALETTE = [
    { base:'#C0392B', light:'#E74C3C', dark:'#922B21' },  // Crimson
    { base:'#27AE60', light:'#2ECC71', dark:'#1E8449' },  // Emerald
    { base:'#2471A3', light:'#3498DB', dark:'#1A5276' },  // Sapphire
    { base:'#D4AC0D', light:'#F1C40F', dark:'#9A7D0A' },  // Gold
    { base:'#7D3C98', light:'#9B59B6', dark:'#6C3483' },  // Amethyst
    { base:'#D35400', light:'#E67E22', dark:'#A04000' },  // Amber
    { base:'#148F77', light:'#1ABC9C', dark:'#0E6655' },  // Jade
    { base:'#2C3E50', light:'#34495E', dark:'#1A252F' },  // Slate
  ];

  // ── State ─────────────────────────────────────────────────────────
  const state = {
    year: new Date().getFullYear(),
    month: new Date().getMonth(),
    userId: null,
    userName: null,
    userColorIdx: null,
    users: {},   // { uid: { name, colorIdx } }
    days: {}     // { "YYYY-MM-DD": { uid: { am, pm, eve, string } } }
  };

  const dayKey = (y,m,d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  // ── User init ─────────────────────────────────────────────────────
  function initUser() {
    state.userId   = localStorage.getItem('bac_uid');
    state.userName = localStorage.getItem('bac_name');
    const ci = localStorage.getItem('bac_color');
    state.userColorIdx = ci !== null ? parseInt(ci) : null;
    if (!state.userId || !state.userName) {
      showNameModal();
    }
  }

  function showNameModal() {
    document.getElementById('name-modal').classList.add('visible');
    setTimeout(() => document.getElementById('name-input').focus(), 100);
  }

  function registerUser(name) {
    if (Object.keys(state.users).length >= 4) {
      alert('This calendar already has 4 people — the maximum.');
      return;
    }
    const uid = 'u_' + Math.random().toString(36).substr(2,9);
    const usedColors = Object.values(state.users).map(u => u.colorIdx);
    let ci = 0;
    while (usedColors.includes(ci) && ci < PALETTE.length) ci++;

    state.userId = uid;
    state.userName = name;
    state.userColorIdx = ci;

    localStorage.setItem('bac_uid', uid);
    localStorage.setItem('bac_name', name);
    localStorage.setItem('bac_color', ci);

    set(ref(db, `users/${uid}`), { name, colorIdx: ci });
    document.getElementById('name-modal').classList.remove('visible');
    renderCalendar();
  }

  // ── Past date check ───────────────────────────────────────────────
  function isPast(y, m, d) {
    const today = new Date();
    const cell  = new Date(y, m, d);
    return cell < new Date(today.getFullYear(), today.getMonth(), today.getDate());
  }

  // ── Toggle slot (single tap) ──────────────────────────────────────
  async function toggleSlot(key, slot) {
    if (!state.userId) return;
    const [y,m,d] = key.split('-').map(Number);
    if (isPast(y, m-1, d)) return;

    const current = (state.days[key] && state.days[key][state.userId]) || {};
    const updated = { ...current, [slot]: !current[slot] };
    Object.keys(updated).forEach(k => { if (!updated[k]) delete updated[k]; });
    await set(ref(db, `days/${key}/${state.userId}`), Object.keys(updated).length ? updated : null);
  }

  // ── Toggle string (double tap) — per third ───────────────────────
  async function toggleString(key, slot) {
    if (!state.userId) return;
    const [y,m,d] = key.split("-").map(Number);
    if (isPast(y, m-1, d)) return;
    const stringKey = slot + "_string";
    const current = (state.days[key] && state.days[key][state.userId]) || {};
    const updated = { ...current, [stringKey]: !current[stringKey] };
    Object.keys(updated).forEach(k => { if (!updated[k]) delete updated[k]; });
    await set(ref(db, `days/${key}/${state.userId}`), Object.keys(updated).length ? updated : null);
  }


  // ── Wind settings ─────────────────────────────────────────────────
  const WIND_X = -0.5;   // ~2330 on clock face
  const WIND_Y = -0.87;

  function smoothNoise(t, seed) {
    const s = seed;
    return (
      Math.sin(t*0.7+s*1.3)*0.40 + Math.sin(t*1.3+s*2.7)*0.25 +
      Math.sin(t*2.1+s*0.9)*0.15 + Math.sin(t*3.7+s*3.1)*0.10 +
      Math.sin(t*5.3+s*1.7)*0.07 + Math.sin(t*8.1+s*4.3)*0.03
    );
  }

  class StringState {
    constructor(seed) {
      this.seed=seed;
      this.freqA=0.6+(seed%7)*0.11; this.freqB=1.1+(seed%5)*0.17;
      this.freqC=2.3+(seed%11)*0.09;
      this.phaseA=(seed*1.618)%(Math.PI*2);
      this.phaseB=(seed*2.718)%(Math.PI*2);
      this.phaseC=(seed*3.141)%(Math.PI*2);
      this.gustStrength=0.5; this.gustTimer=Math.random()*3;
      this.flickActive=false; this.flickT=0; this.flickAmp=0;
      this.nextFlick=1+Math.random()*4;
    }
    update(dt) {
      this.gustTimer+=dt;
      const gn=smoothNoise(this.gustTimer*0.4,this.seed);
      this.gustStrength=0.3+(gn+1)*0.5*0.8;
      this.nextFlick-=dt;
      if(this.nextFlick<=0&&!this.flickActive){
        this.flickActive=true; this.flickT=0;
        this.flickAmp=1.5+Math.random()*2.5;
        this.nextFlick=1.5+Math.random()*5;
      }
      if(this.flickActive){
        this.flickT+=dt;
        if(this.flickT>1.2){
          this.flickAmp-=dt*2.5;
          if(this.flickAmp<=0){this.flickActive=false;this.flickAmp=0;}
        }
      }
    }
    getX(yNorm, t, speed, sway) {
      const envelope=0.05+Math.pow(yNorm,1.2)*0.95;
      const freqMod=1+WIND_Y*0.3;
      const windOffsetX=WIND_X*2.5;
      const primary=Math.sin(yNorm*Math.PI*1.4*freqMod-t*speed*this.freqA+this.phaseA+windOffsetX)*this.gustStrength;
      const ripple=Math.sin(yNorm*Math.PI*2.8*freqMod-t*speed*this.freqB+this.phaseB)*0.3*this.gustStrength;
      const shimmer=Math.sin(yNorm*Math.PI*5.2-t*speed*this.freqC+this.phaseC)*0.15*this.gustStrength*yNorm;
      let flick=0;
      if(this.flickActive||this.flickAmp>0){
        const flickFront=this.flickT*1.8;
        const activated=Math.max(0,Math.min(1,(yNorm-(1-flickFront))*6));
        flick=activated*this.flickAmp*Math.sin(yNorm*Math.PI*1.6-this.flickT*10+this.phaseA);
      }
      const lean=WIND_X*yNorm*1.8;
      return (primary+ripple+shimmer+flick)*envelope*sway+lean*sway*0.3;
    }
  }

  // Store: keyed by "dayKey_uid_spanStart_spanEnd"
  const stringStates = {};

  function getStringState(key) {
    if (!stringStates[key]) {
      const seed = key.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
      stringStates[key] = new StringState(seed);
    }
    return stringStates[key];
  }

  // ── Span-based wind settings ───────────────────────────────────────
  function spanSettings(spanLength) {
    if (spanLength === 1) return { speed: 1.2, sway: 6.0 };
    if (spanLength === 2) return { speed: 2.8, sway: 7.0 };
    return                       { speed: 3.8, sway: 12.5 };
  }

  let animT = 0;
  let lastAnimTime = null;

  function animationTick(ts) {
    if (!lastAnimTime) lastAnimTime = ts;
    const dt = Math.min((ts - lastAnimTime) / 1000, 0.05);
    lastAnimTime = ts;
    animT += dt;
    Object.values(stringStates).forEach(s => s.update(dt));
    // Re-render all visible canvases
    document.querySelectorAll('.day-cell canvas').forEach(canvas => {
      const d = canvas.getAttribute('data-daykey');
      const data = d ? (state.days[d] || {}) : {};
      const past = canvas.getAttribute('data-past') === '1';
      drawCell(canvas, data, past);
    });
    requestAnimationFrame(animationTick);
  }

  // ── Draw cell on canvas ───────────────────────────────────────────
  function drawCell(canvas, dayData, past) {
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    const slots = ['am','pm','eve'];

    // ── Fill thirds ──
    slots.forEach((slot, si) => {
      const x = si * (W / 3);
      const w = W / 3;
      const activeUids = Object.keys(dayData).filter(uid => dayData[uid] && dayData[uid][slot]);
      if (!activeUids.length) return;

      if (activeUids.length === 1) {
        const uid = activeUids[0];
        const user = state.users[uid];
        if (!user) return;
        const col = PALETTE[user.colorIdx % PALETTE.length];
        const g = ctx.createLinearGradient(x, 0, x + w, H);
        g.addColorStop(0, col.light);
        g.addColorStop(0.5, col.base);
        g.addColorStop(1, col.dark);
        ctx.fillStyle = g;
        ctx.fillRect(x, 0, w, H);
        ctx.save(); ctx.globalAlpha = 0.04;
        for (let i = 0; i < w * H * 0.1; i++) {
          const v = Math.random() > 0.5 ? 255 : 0;
          ctx.fillStyle = `rgb(${v},${v},${v})`;
          ctx.fillRect(x + Math.random() * w, Math.random() * H, 1, 1);
        }
        ctx.restore();
      } else {
        // Diagonal stripes — continuous across the full canvas at -45deg
        // so touching thirds share seamless stripes.
        // Clip to this third only to keep colours inside their boundary.
        const stripeW = 5;
        const period  = stripeW * activeUids.length;

        ctx.save();
        ctx.beginPath();
        ctx.rect(x, 0, w, H);
        ctx.clip();

        // Stripe offset calculated from x=0 (full canvas) so pattern
        // is continuous — touching thirds line up perfectly.
        const diagRange = W + H;
        for (let d = -H; d < diagRange; d += period) {
          activeUids.forEach((uid, ui) => {
            const user = state.users[uid];
            if (!user) return;
            const col  = PALETTE[user.colorIdx % PALETTE.length];
            const off  = d + ui * stripeW;
            // -45deg parallelogram stripe in full canvas space
            ctx.beginPath();
            ctx.moveTo(off,         0);
            ctx.lineTo(off + stripeW, 0);
            ctx.lineTo(off + stripeW + H, H);
            ctx.lineTo(off + H,           H);
            ctx.closePath();
            ctx.globalAlpha = 0.8;
            ctx.fillStyle = col.base;
            ctx.fill();
          });
        }

        ctx.restore();
      }
    });

    // ── Strings — animated, per third, contiguous runs merge ──────────
    const uids = Object.keys(dayData);
    // Count all threads per span for spacing
    const spanThreads = {}; // key "i-j" => [uid,...]
    uids.forEach(uid => {
      const ud = dayData[uid];
      if (!ud) return;
      const hasString = [!!ud.am_string, !!ud.pm_string, !!ud.eve_string];
      if (!hasString.some(Boolean)) return;
      let i = 0;
      while (i < 3) {
        if (!hasString[i]) { i++; continue; }
        let j = i;
        while (j < 3 && hasString[j]) j++;
        const sk = i+'-'+j;
        if (!spanThreads[sk]) spanThreads[sk] = [];
        spanThreads[sk].push(uid);
        i = j;
      }
    });

    uids.forEach(uid => {
      const ud = dayData[uid];
      if (!ud) return;
      const user = state.users[uid];
      if (!user) return;
      const col = PALETTE[user.colorIdx % PALETTE.length];
      const hasString = [!!ud.am_string, !!ud.pm_string, !!ud.eve_string];
      if (!hasString.some(Boolean)) return;

      let i = 0;
      while (i < 3) {
        if (!hasString[i]) { i++; continue; }
        let j = i;
        while (j < 3 && hasString[j]) j++;

        const sk = i+'-'+j;
        const spanLen = j - i;
        const { speed, sway } = spanSettings(spanLen);
        const threadsInSpan = spanThreads[sk] || [uid];
        const threadIdx = threadsInSpan.indexOf(uid);
        const totalThreads = threadsInSpan.length;

        const xStart = (i / 3) * W;
        const xEnd   = (j / 3) * W;
        const spanW  = xEnd - xStart;

        // Space threads evenly across span
        const slots = totalThreads + 1;
        const baseX = xStart + (spanW / slots) * (threadIdx + 1);

        // Get or create state for this string
        const stateKey = canvas.getAttribute('data-daykey')+'_'+uid+'_'+i+'_'+j;
        const strState = getStringState(stateKey);

        // Draw with window-frame clipping — clip to full cell width only
        // so string can pass behind the cell edge (window frame effect)
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 0, W, H);
        ctx.clip();

        ctx.shadowColor='rgba(0,0,0,0.9)';
        ctx.shadowBlur=4; ctx.shadowOffsetX=1; ctx.shadowOffsetY=0.5;

        const grd=ctx.createLinearGradient(baseX-3,0,baseX+3,0);
        grd.addColorStop(0,col.dark); grd.addColorStop(0.35,col.light);
        grd.addColorStop(0.65,col.light); grd.addColorStop(1,col.dark);
        ctx.strokeStyle=grd; ctx.lineWidth=2.0;
        ctx.lineCap='round'; ctx.lineJoin='round';

        const SEGS=60;
        ctx.beginPath();
        for(let s=0;s<=SEGS;s++){
          const yNorm=s/SEGS, y=yNorm*H;
          const dx=strState.getX(yNorm,animT,speed,sway);
          const x=baseX+dx;
          s===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
        }
        ctx.stroke();
        ctx.restore();

        i = j;
      }
    });

    if (past) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, W, H);
    }
  }



  // ── Render calendar ───────────────────────────────────────────────
  function renderCalendar() {
    const { year, month } = state;
    document.getElementById('month-title').textContent = `${MONTHS[month]} ${year}`;

    // Make month/year clickable
    document.getElementById('month-title').style.cursor = 'pointer';

    // User indicator
    const ui = document.getElementById('user-indicator');
    if (state.userName && state.userColorIdx !== null) {
      const col = PALETTE[state.userColorIdx % PALETTE.length];
      ui.textContent = '◈ ' + state.userName;
      ui.style.color = col.light;
    } else {
      ui.style.display = 'none';
    }

    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';

    ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
      const h = document.createElement('div');
      h.className = 'day-header';
      h.textContent = d;
      grid.appendChild(h);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const offset = firstDay === 0 ? 6 : firstDay - 1;
    for (let i = 0; i < offset; i++) {
      const b = document.createElement('div');
      b.className = 'day-cell empty';
      grid.appendChild(b);
    }

    const total = new Date(year, month + 1, 0).getDate();
    const today = new Date();

    for (let d = 1; d <= total; d++) {
      const key = dayKey(year, month, d);
      const dayData = state.days[key] || {};
      const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;
      const past = isPast(year, month, d);
      const dow = new Date(year, month, d).getDay();

      const cell = document.createElement('div');
      cell.className = 'day-cell' + (isToday?' today':'') + (past?' past':'') + (dow===0||dow===6?' weekend':'');

      // Canvas for colour fills and strings
      const canvas = document.createElement('canvas');
      canvas.width = 60; canvas.height = 60;
      canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
      canvas.setAttribute('data-daykey', key);
      canvas.setAttribute('data-past', past ? '1' : '0');
      drawCell(canvas, dayData, past);
      cell.appendChild(canvas);

      // Day number on top
      const num = document.createElement('span');
      num.className = 'day-num';
      num.textContent = d;
      num.style.position = 'relative';
      num.style.zIndex = '2';
      cell.appendChild(num);

      if (!past) {
        let holdTimer = null;
        let didHold = false;
        let activeSlot = null;

        const getSlot = (e) => {
          const rect = cell.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const w = rect.width;
          return x < w / 3 ? 'am' : x < 2 * w / 3 ? 'pm' : 'eve';
        };

        cell.addEventListener('pointerdown', e => {
          e.preventDefault();
          didHold = false;
          activeSlot = getSlot(e);
          holdTimer = setTimeout(() => {
            didHold = true;
            toggleString(key, activeSlot);
          }, 500);
        });

        cell.addEventListener('pointerup', e => {
          e.preventDefault();
          clearTimeout(holdTimer);
          if (!didHold) toggleSlot(key, activeSlot);
        });

        cell.addEventListener('pointercancel', () => {
          clearTimeout(holdTimer);
        });

        cell.addEventListener('pointerleave', () => {
          clearTimeout(holdTimer);
        });

        cell.addEventListener('click', e => {
          e.preventDefault();
          e.stopPropagation();
        });
      }

      grid.appendChild(cell);
    }

    // Legend — dynamic based on users
    renderLegend();
  }

  function renderLegend() {
    const leg = document.getElementById('legend-inner');
    leg.innerHTML = '';
    Object.values(state.users).forEach(user => {
      const col = PALETTE[user.colorIdx % PALETTE.length];
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<div class="legend-swatch" style="background:linear-gradient(135deg,${col.light},${col.dark});border-color:${col.base}"></div>${user.name}`;
      leg.appendChild(item);
    });
  }

  // ── Month/year picker ─────────────────────────────────────────────
  function showDatePicker() {
    const modal = document.getElementById('picker-modal');
    const grid  = document.getElementById('picker-grid');
    grid.innerHTML = '';

    MONTHS.forEach((m, i) => {
      const btn = document.createElement('button');
      btn.className = 'picker-month-btn' + (i === state.month ? ' active' : '');
      btn.textContent = m.substr(0, 3);
      btn.addEventListener('click', () => {
        state.month = i;
        modal.classList.remove('visible');
        renderCalendar();
      });
      grid.appendChild(btn);
    });

    document.getElementById('picker-year').textContent = state.year;
    modal.classList.add('visible');
  }

  // ── Firebase listeners ────────────────────────────────────────────
  onValue(ref(db, 'days'),  snap => { state.days  = snap.val() || {}; renderCalendar(); });
  onValue(ref(db, 'users'), snap => { state.users = snap.val() || {}; renderCalendar(); });

  // Start animation loop
  requestAnimationFrame(animationTick);

  // ── Boot ──────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    initUser();

    document.getElementById('prev-btn').addEventListener('click', () => {
      state.month--; if (state.month < 0) { state.month = 11; state.year--; } renderCalendar();
    });
    document.getElementById('next-btn').addEventListener('click', () => {
      state.month++; if (state.month > 11) { state.month = 0; state.year++; } renderCalendar();
    });

    document.getElementById('month-title').addEventListener('click', showDatePicker);

    // Year controls in picker
    document.getElementById('yr-prev').addEventListener('click', () => {
      state.year--;
      document.getElementById('picker-year').textContent = state.year;
    });
    document.getElementById('yr-next').addEventListener('click', () => {
      state.year++;
      document.getElementById('picker-year').textContent = state.year;
    });

    document.getElementById('picker-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('picker-modal'))
        document.getElementById('picker-modal').classList.remove('visible');
    });

    // Swipe
    let startX = 0;
    const cal = document.getElementById('calendar-wrapper');
    cal.addEventListener('touchstart', e => startX = e.touches[0].clientX, {passive:true});
    cal.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      if (Math.abs(dx) > 50) {
        dx < 0 ? document.getElementById('next-btn').click() : document.getElementById('prev-btn').click();
      }
    }, {passive:true});

    // Name form
    document.getElementById('name-submit').addEventListener('click', () => {
      const name = document.getElementById('name-input').value.trim();
      if (name.length < 1) return;
      registerUser(name);
    });
    document.getElementById('name-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('name-submit').click();
    });

    // Easter egg — tap the A in Arse
    document.getElementById('easter-a').addEventListener('click', e => {
      e.stopPropagation();
      document.getElementById('easter-modal').classList.add('visible');
      setTimeout(() => document.getElementById('easter-modal').classList.remove('visible'), 3000);
    });
    document.getElementById('easter-modal').addEventListener('click', () => {
      document.getElementById('easter-modal').classList.remove('visible');
    });
  });
</script>
